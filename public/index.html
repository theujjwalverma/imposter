<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imposter Game</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel" id="joinPanel">
        <h1>Imposter Game</h1>
        <p id="joinHint">Create a room or join one with code.</p>

        <div class="field">
          <label for="nameInput">Your Name</label>
          <input id="nameInput" maxlength="24" placeholder="Rahul" />
        </div>

        <div class="row">
          <button id="createBtn" class="primary">Create Room</button>
        </div>

        <div class="divider">OR</div>

        <div class="field" id="codeField">
          <label for="codeInput">Room Code</label>
          <input id="codeInput" maxlength="6" placeholder="7XH92K" />
        </div>
        <div class="row">
          <button id="joinBtn">Join Room</button>
        </div>
        <p id="errorText" class="error"></p>
      </section>

      <section class="panel hidden" id="gamePanel">
        <header class="header">
          <div>
            <p class="muted">Room Code</p>
            <h2 id="roomCode">------</h2>
          </div>
          <div>
            <p class="muted">Players Joined</p>
            <h2 id="playerCount">0/100</h2>
          </div>
        </header>
        <p class="shareLine hidden" id="shareLine">
          Player Link:
          <a id="shareLink" href="#" target="_blank" rel="noopener noreferrer"></a>
          <button id="copyLinkBtn" class="small">Copy</button>
        </p>

        <section id="lobbyView" class="view hidden">
          <h3>Lobby</h3>
          <div class="row hidden" id="imposterCountRow">
            <label for="imposterCountSelect">Imposters</label>
            <select id="imposterCountSelect">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
            </select>
          </div>
          <div class="playersWrap">
            <ul id="playersList" class="playersList"></ul>
          </div>
          <div class="row">
            <button id="startBtn" class="primary hidden">Start Game</button>
          </div>
        </section>

        <section id="cardView" class="view hidden">
          <h3 id="cardTitle">YOUR WORD</h3>
          <div id="cardBox" class="card"></div>
          <div class="row">
            <button id="goVotingBtn" class="hidden">Open Voting</button>
          </div>
        </section>

        <section id="votingView" class="view hidden">
          <h3>Who is the imposter?</h3>
          <p id="votesLeftText" class="muted"></p>
          <ul id="voteList" class="voteList"></ul>
          <div class="row">
            <button id="revealBtn" class="danger hidden">Reveal Result</button>
          </div>
        </section>

        <section id="revealView" class="view hidden">
          <h3>Reveal</h3>
          <p id="revealMain" class="revealMain"></p>
          <p id="revealSub" class="muted"></p>
          <div class="row">
            <button id="resetBtn" class="primary hidden">Play Again</button>
          </div>
        </section>
      </section>
      <footer class="appFooter">
        <span id="footerLine">Somebody in this room vibe coded this game. Guess who?</span>
        <button id="footerRevealBtn" class="footerRevealBtn" type="button">Reveal!</button>
      </footer>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
